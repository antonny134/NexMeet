<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexMeet</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#0f0f13;color:#fff;min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#18181f;border-bottom:1px solid #2a2a3a;flex-wrap:wrap;gap:10px;}
.logo .a{color:#007BFF;font-size:1.5em;font-weight:bold;}
.logo .b{color:#28A745;font-size:1.5em;font-weight:bold;}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:.9em;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:opacity .2s;}
.btn:hover{opacity:.85;}
.btn-blue{background:#007BFF;color:#fff;}
.btn-green{background:#28A745;color:#fff;}
.btn-red{background:#dc3545;color:#fff;}
.btn-ghost{background:transparent;border:2px solid #007BFF;color:#007BFF;}
.btn-ghost:hover{background:#007BFF;color:#fff;}
.page{display:none;min-height:calc(100vh - 57px);}
.page.active{display:flex;align-items:center;justify-content:center;}
#page-home{flex-direction:column;text-align:center;padding:60px 20px;}
#page-home h1{font-size:2.6em;margin-bottom:10px;}
#page-home p{color:#aaa;margin-bottom:36px;}
.fcard{background:#18181f;border:1px solid #2a2a3a;border-radius:14px;padding:36px 32px;width:340px;}
.fcard h2{text-align:center;margin-bottom:22px;}
.fcard input{width:100%;padding:12px;margin-bottom:12px;background:#0f0f13;border:1px solid #2a2a3a;border-radius:8px;color:#fff;outline:none;font-size:.95em;}
.fcard input:focus{border-color:#007BFF;}
.fcard .btn{width:100%;justify-content:center;}
.fcard .sw{text-align:center;margin-top:12px;color:#aaa;font-size:.85em;}
.fcard .sw a{color:#007BFF;cursor:pointer;text-decoration:underline;}
#page-meet{flex-direction:column;align-items:stretch;}
.meet-top{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#18181f;border-bottom:1px solid #2a2a3a;flex-wrap:wrap;gap:10px;}
.linkbox{display:flex;align-items:center;gap:6px;background:#0f0f13;border:1px solid #2a2a3a;border-radius:8px;padding:7px 12px;}
.linkbox input{background:transparent;border:none;color:#aaa;font-size:.8em;outline:none;width:220px;}
.linkbox button{background:none;border:none;color:#007BFF;cursor:pointer;font-size:1em;}
.statusbar{text-align:center;padding:8px;font-size:.85em;background:#0f0f13;}
.statusbar.waiting{color:#f0ad4e;}
.statusbar.connected{color:#28A745;}
.statusbar.error{color:#dc3545;}
.videos{flex:1;display:flex;align-items:center;justify-content:center;gap:16px;padding:24px;background:#0f0f13;flex-wrap:wrap;min-height:360px;}
.vbox{position:relative;background:#1a1a22;border-radius:14px;overflow:hidden;border:2px solid #2a2a3a;}
.vbox video{display:block;width:100%;height:100%;object-fit:cover;}
.vbox .lbl{position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.6);padding:3px 10px;border-radius:6px;font-size:.8em;}
.vbox .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#555;font-size:.85em;}
.vbox .placeholder i{font-size:2.8em;color:#333;}
.vbox.remote{width:480px;height:340px;}
.vbox.local{width:280px;height:200px;}
@media(max-width:680px){.vbox.remote{width:100%;height:220px;}.vbox.local{width:130px;height:100px;}.videos{padding:12px;}}
.controls{display:flex;align-items:center;justify-content:center;gap:12px;padding:16px;background:#18181f;border-top:1px solid #2a2a3a;flex-wrap:wrap;}
.cicon{width:44px;height:44px;border-radius:50%;background:#2a2a3a;border:none;color:#ccc;font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.cicon:hover{background:#3a3a4a;}
.cicon.off{background:#dc3545;color:#fff;}
.spinner{width:24px;height:24px;border:3px solid #333;border-top-color:#007BFF;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast-el{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#28A745;color:#fff;padding:10px 22px;border-radius:10px;font-size:.9em;z-index:999;}
</style>
</head>
<body>

<nav>
  <div class="logo"><span class="a">Nex</span><span class="b">Meet</span></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn btn-ghost" onclick="showPage('login')"><i class="bi bi-box-arrow-in-right"></i> Login</button>
    <button class="btn btn-green" onclick="showPage('cadastro')"><i class="bi bi-person-plus"></i> Cadastro</button>
    <button class="btn btn-blue" onclick="criarSala()"><i class="bi bi-camera-video"></i> Nova reunião</button>
  </div>
</nav>

<div class="page active" id="page-home">
  <h1><span style="color:#007BFF">Nex</span><span style="color:#28A745">Meet</span></h1>
  <p>Reuniões de vídeo simples e rápidas.</p>
  <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-blue" style="font-size:1em;padding:14px 28px" onclick="criarSala()">
      <i class="bi bi-camera-video-fill"></i> Criar reunião
    </button>
  </div>
</div>

<div class="page" id="page-login">
  <div class="fcard">
    <h2>Login</h2>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Senha">
    <button class="btn btn-blue" onclick="showToast('Login realizado!');showPage('home')"><i class="bi bi-box-arrow-in-right"></i> Entrar</button>
    <p class="sw">Sem conta? <a onclick="showPage('cadastro')">Cadastre-se</a></p>
  </div>
</div>

<div class="page" id="page-cadastro">
  <div class="fcard">
    <h2>Cadastro</h2>
    <input type="text" placeholder="Nome Completo">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Senha">
    <button class="btn btn-green" onclick="showToast('Conta criada!');showPage('login')"><i class="bi bi-person-plus"></i> Registrar</button>
    <p class="sw">Já tem conta? <a onclick="showPage('login')">Login</a></p>
  </div>
</div>

<div class="page" id="page-meet" style="min-height:calc(100vh - 57px);flex-direction:column;">
  <div class="meet-top">
    <div class="logo"><span class="a">Nex</span><span class="b">Meet</span></div>
    <div class="linkbox">
      <i class="bi bi-link-45deg" style="color:#007BFF"></i>
      <input id="linkInput" type="text" readonly>
      <button onclick="copiarLink()" title="Copiar"><i class="bi bi-clipboard"></i></button>
    </div>
    <button class="btn btn-red" onclick="sair()"><i class="bi bi-telephone-x-fill"></i> Sair</button>
  </div>

  <div class="statusbar waiting" id="statusBar">
    <span id="statusTxt">A conectar...</span>
  </div>

  <div class="videos">
    <div class="vbox remote">
      <video id="videoRemoto" autoplay playsinline></video>
      <div class="placeholder" id="placeholderRemoto">
        <div class="spinner" id="spinnerRemoto" style="display:none"></div>
        <i class="bi bi-person-circle" id="icoRemoto"></i>
        <span id="txtRemoto">Aguardando participante...</span>
      </div>
      <div class="lbl">Participante</div>
    </div>
    <div class="vbox local">
      <video id="videoLocal" autoplay playsinline muted></video>
      <div class="placeholder" id="placeholderLocal">
        <i class="bi bi-camera-video-off"></i>
        <span>Câmera off</span>
      </div>
      <div class="lbl">Você</div>
    </div>
  </div>

  <div class="controls">
    <button class="cicon" id="btnMic" onclick="toggleMic()" title="Microfone"><i class="bi bi-mic-fill" id="icoMic"></i></button>
    <button class="cicon" id="btnCam" onclick="toggleCam()" title="Câmera"><i class="bi bi-camera-video-fill" id="icoCam"></i></button>
    <button class="btn btn-blue" id="btnAtiv" onclick="ativarCamera()">
      <i class="bi bi-camera-video-fill"></i> Ativar câmera
    </button>
  </div>
</div>

<div class="toast-el" id="toastEl"></div>

<script>
var peer=null, localStream=null, currentCall=null;
var micOn=true, camOn=true, souHost=false, roomId=null;

function showPage(n){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('page-'+n).classList.add('active');
}

function showToast(msg,color){
  var t=document.getElementById('toastEl');
  t.textContent=msg; t.style.background=color||'#28A745';
  t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(function(){t.style.display='none';},2800);
}

function setStatus(msg,cls){
  document.getElementById('statusTxt').textContent=msg;
  document.getElementById('statusBar').className='statusbar '+cls;
}

function criarSala(){
  var params=new URLSearchParams(window.location.search);
  roomId=params.get('room');
  if(!roomId){
    roomId=Math.random().toString(36).substring(2,9).toUpperCase();
    history.replaceState(null,'','?room='+roomId);
  }
  document.getElementById('linkInput').value=window.location.href;
  showPage('meet');
  conectar();
}

// Estratégia: HOST registra Peer ID fixo = "nexmeet-SALA-host"
// GUEST detecta erro "unavailable-id" e chama o host pelo ID fixo
function conectar(){
  if(peer){peer.destroy();peer=null;}
  var hostId='nexmeet-'+roomId+'-host';
  setStatus('A conectar...','waiting');

  peer=new Peer(hostId);

  peer.on('open',function(id){
    souHost=true;
    console.log('HOST aberto:',id);
    setStatus('Sala criada! Compartilhe o link e aguarde o participante...','waiting');

    peer.on('call',function(call){
      console.log('HOST: recebendo chamada do guest');
      showSpinner(true);
      call.answer(localStream||new MediaStream());
      currentCall=call;
      call.on('stream',function(s){mostrarRemoto(s);});
      call.on('close',function(){remotoDesconectou();});
      call.on('error',function(e){console.error('call error',e);});
    });
  });

  peer.on('error',function(err){
    if(err.type==='unavailable-id'){
      console.log('GUEST: host existe, entrando como guest');
      peer.destroy();
      entrarComoGuest(hostId);
    } else {
      console.error('Peer error:',err.type,err);
      setStatus('Erro de rede: '+err.type,'error');
    }
  });
}

function entrarComoGuest(hostId){
  peer=new Peer();
  peer.on('open',function(myId){
    souHost=false;
    console.log('GUEST id:',myId,'| host:',hostId);
    setStatus('Conectando ao host...','waiting');
    showSpinner(true);
    chamarHost(hostId);
  });
  peer.on('error',function(err){
    console.error('Guest error:',err.type);
    setStatus('Erro: '+err.type,'error');
  });
}

function chamarHost(hostId){
  var stream=localStream||new MediaStream();
  var call=peer.call(hostId,stream);
  if(!call){setStatus('Não foi possível chamar o host','error');return;}
  currentCall=call;
  call.on('stream',function(s){console.log('GUEST: stream recebido');mostrarRemoto(s);});
  call.on('close',function(){remotoDesconectou();});
  call.on('error',function(e){console.error(e);setStatus('Erro na chamada','error');});
}

function mostrarRemoto(stream){
  var v=document.getElementById('videoRemoto');
  v.srcObject=stream;
  document.getElementById('placeholderRemoto').style.display='none';
  showSpinner(false);
  setStatus('Participante conectado','connected');
  showToast('Participante entrou!');
}

function remotoDesconectou(){
  document.getElementById('videoRemoto').srcObject=null;
  document.getElementById('placeholderRemoto').style.display='flex';
  document.getElementById('icoRemoto').style.display='';
  document.getElementById('txtRemoto').textContent='Participante saiu';
  showSpinner(false);
  setStatus('Aguardando participante...','waiting');
  currentCall=null;
  showToast('Participante desconectou.','#f0ad4e');
}

function showSpinner(show){
  document.getElementById('spinnerRemoto').style.display=show?'block':'none';
  document.getElementById('icoRemoto').style.display=show?'none':'';
}

async function ativarCamera(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    document.getElementById('videoLocal').srcObject=localStream;
    document.getElementById('placeholderLocal').style.display='none';
    document.getElementById('btnAtiv').style.display='none';

    // Substituir tracks na chamada ativa
    if(currentCall&&currentCall.peerConnection){
      var senders=currentCall.peerConnection.getSenders();
      localStream.getTracks().forEach(function(track){
        var s=senders.find(function(x){return x.track&&x.track.kind===track.kind;});
        if(s) s.replaceTrack(track); else currentCall.peerConnection.addTrack(track,localStream);
      });
    }

    // Guest ativa câmera e ainda não chamou
    if(!souHost&&!currentCall){
      chamarHost('nexmeet-'+roomId+'-host');
    }

    showToast('Câmera ativada!');
  }catch(e){
    showToast('Erro câmera: '+e.message,'#dc3545');
  }
}

function toggleMic(){
  if(!localStream)return;
  micOn=!micOn;
  localStream.getAudioTracks().forEach(function(t){t.enabled=micOn;});
  document.getElementById('icoMic').className=micOn?'bi bi-mic-fill':'bi bi-mic-mute-fill';
  document.getElementById('btnMic').classList.toggle('off',!micOn);
}

function toggleCam(){
  if(!localStream)return;
  camOn=!camOn;
  localStream.getVideoTracks().forEach(function(t){t.enabled=camOn;});
  document.getElementById('icoCam').className=camOn?'bi bi-camera-video-fill':'bi bi-camera-video-off-fill';
  document.getElementById('btnCam').classList.toggle('off',!camOn);
  document.getElementById('placeholderLocal').style.display=camOn?'none':'flex';
}

function copiarLink(){
  navigator.clipboard.writeText(window.location.href)
    .then(function(){showToast('Link copiado! Compartilhe para convidar.');});
}

function sair(){
  if(currentCall)currentCall.close();
  if(localStream)localStream.getTracks().forEach(function(t){t.stop();});
  if(peer)peer.destroy();
  localStream=null;peer=null;currentCall=null;
  history.replaceState(null,'',window.location.pathname);
  showPage('home');
}

window.addEventListener('DOMContentLoaded',function(){
  if(new URLSearchParams(window.location.search).get('room')){
    criarSala();
  }
});
</script>
</body>
</html>
